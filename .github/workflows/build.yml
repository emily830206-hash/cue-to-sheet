name: Build CueToSheet apps

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    name: Windows exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build Windows app
        run: >
          python -m PyInstaller
          --noconfirm
          --onefile
          --windowed
          --name start_cue_tool
          cue_to_sheet_gui.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CueToSheet_Windows
          path: dist/start_cue_tool.exe

  build-macos:
    name: macOS app (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple-Silicon
            runner: macos-14
            artifact: CueToSheet_Mac_AppleSilicon
          - label: Intel
            runner: macos-15-intel
            artifact: CueToSheet_Mac_Intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build macOS app
        run: >
          python -m PyInstaller
          --noconfirm
          --windowed
          --name CueToSheet
          cue_to_sheet_gui.py

      - name: Ad-hoc sign macOS app
        run: |
          codesign --force --deep --sign - dist/CueToSheet.app
          codesign --verify --deep --strict dist/CueToSheet.app

      - name: Zip macOS app
        run: ditto -c -k --sequesterRsrc --keepParent dist/CueToSheet.app "${{ matrix.artifact }}.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
